name: Release

# Publishes @boxlab/yandex-mcp-core to npm when a GitHub Release is published,
# via npm Trusted Publishing — OIDC, no NPM_TOKEN, same as yandex-metrica-mcp.
# Configure the trusted publisher once on npmjs.com (the package's Settings ->
# Trusted publishing) pointing at this repo + this workflow file; that needs the
# package to exist, so 0.1.0 is published by hand once to bootstrap. Trusted
# Publishing signs the tarball with provenance automatically. Install/build run
# via Bun from the committed bun.lock; the artifact is plain tsc output (Node).
on:
    release:
        types: [published]

permissions:
    contents: read
    id-token: write

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
            - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
              with:
                  bun-version: latest
            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
              with:
                  node-version: 22
                  registry-url: https://registry.npmjs.org
            - name: Verify the package version matches the release tag
              run: |
                  TAG="${GITHUB_REF_NAME#v}"
                  PKG="$(node -p "require('./package.json').version")"
                  test "$PKG" = "$TAG" || {
                    echo "package.json version ($PKG) does not match release tag ($TAG)"; exit 1;
                  }
            - run: npm install -g npm@11.18.0
            - run: bun install --frozen-lockfile
            - run: bun run build
            - name: Publish to npm with provenance (skip if already there)
              run: |
                  VERSION="$(node -p "require('./package.json').version")"
                  if npm view "@boxlab/yandex-mcp-core@${VERSION}" version >/dev/null 2>&1; then
                    echo "@boxlab/yandex-mcp-core@${VERSION} is already published — skipping"
                  else
                    npm publish --provenance --access public --ignore-scripts
                  fi
